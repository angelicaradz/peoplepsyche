<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width-device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/sty.css">
        <title>Register | PeoplePsyche</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    </head>

    <body class="p-5">
        <div class="container d-flex flex-lg-row justify-content-center align-items-center min-vh-100">

            <!-- REGISTER BOX -->
            <div class="row border rounded-5 p-4 shadow box-area bg-white justify-content-center align-items-center">

                <!-- FORM TITLE -->
                <div class="row flex-lg-row mb-3">
                    <h1>Registration Form</h1>
                </div>

                <!-- REGISTER FORM -->
                <div class="row flex-lg-row justify-content-center align-items-center">
                    <form id="register-form" class="row mb-4 g-3" action="POST">

                        <!-- FIRST NAME -->
                        <div class="col md-3">
                            <div class="form-floating overflow-hidden">
                                <input type="name" class="form-control" id="floatingGivenName" placeholder="Juan" required>
                                <label for="floatingGivenName">Given Name</label>
                            </div>
                        </div>

                        <!-- MIDDLE NAME -->
                        <div class="col-md-3">
                            <div class="form-floating overflow-hidden">
                                <input type="name" class="form-control" id="floatingMiddleName" placeholder="Dela">
                                <label for="floatingMiddleName">Middle Name</label>
                            </div>
                        </div>

                        <!-- LAST NAME -->
                        <div class="col-md-3">
                            <div class="form-floating overflow-hidden">
                                <input type="name" class="form-control" id="floatingLastName" placeholder="Cruz" required>
                                <label for="floatingLastName">Last Name</label>
                            </div>
                        </div>

                        <!-- SUFFIX NAME -->
                        <div class="col-md-3">
                            <div class="form-floating overflow-hidden">
                                <input type="name" class="form-control" id="floatingSuffixName" placeholder="Jr">
                                <label for="floatingSuffixName">Suffix Name</label>
                            </div>
                        </div>

                        <!-- EMAIL ADDRESS -->
                        <div class="col-md-6">
                            <div class="form-floating overflow-hidden">
                                <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" required>
                                <label for="floatingEmail">Email</label>
                            </div>
                        </div>

                        <!-- PHONE NUMBER -->
                        <div class="col-md-6">
                            <div class="form-floating overflow-hidden">
                                <input type="tel" class="form-control" id="floatingCpNumber" placeholder="XXXXXXXXXXX" required>
                                <label for="floatingCpNumber">Mobile Number</label>
                            </div>
                        </div>

                        <!-- BIRTHDATE -->
                        <div class="col-md-6">
                            <div class="form-floating overflow-hidden">
                                <input type="date" class="form-control" id="floatingBirthday" placeholder="MM/DD/YYYY" required>
                                <label for="floatingBirthday">Birthday</label>
                            </div>
                        </div>

                        <!-- SEX -->
                        <div class="col-md-6">
                            <div class="form-floating overflow-hidden">
                                <select class="form-select" id="floatingSex" aria-label="Floating label select example" required>
                                    <option selected disabled>Select Sex</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                </select>
                                <label for="floatingGender">Sex</label>
                            </div>
                        </div>

                        <!-- CIVIL STATUS -->
                        <div class="col-md-6">
                            <div class="form-floating overflow-hidden">
                                <select class="form-select" id="floatingCivilStat" aria-label="Floating label select example" required>
                                    <option selected disabled>Select Civil Status</option>
                                    <option value="Single">Single</option>
                                    <option value="Married">Married</option>
                                    <option value="Separated">Separated</option>
                                    <option value="Divorced">Divorced</option>
                                    <option value="Widowed">Widowed</option>
                                </select>
                                <label for="floatingCivilStat">Civil Status</label>
                            </div>
                        </div>

                        <!-- RELIGION -->
                        <div class="col-md-6">
                            <div class="form-floating overflow-hidden">
                                <input type="text" class="form-control" id="floatingReligion" placeholder="Roman Catholic">
                                <label for="floatingReligion">Religion</label>
                            </div>
                        </div>

                        <!-- HOME ADDRESS -->
                        <div class="col-md-12">
                            <div class="form-floating overflow-hidden">
                                <input type="text" class="form-control" id="floatingAddress" placeholder="Home address" required>
                                <label for="floatingAddress">Home Address</label>
                            </div>
                        </div>

                        <!-- ACCESS CODE -->
                        <div class="col-md-12">
                            <div class="form-floating overflow-hidden">
                                <input type="text" class="form-control" id="floatingRegCode" placeholder="Access code" required>
                                <label for="floatingRegCode">Access Code</label>
                            </div>
                        </div>

                        <!-- PASSWORD -->
                        <div class="col-md-12">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                                <label for="floatingPassword">Password</label>
                            </div>
                        </div>

                        <!-- TERMS AND CONDITIONS -->
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="flexCheckChecked" checked required>
                            <label class="form-check-label text-secondary" for="flexCheckChecked">
                                I have read and agree to the <a href="#">Terms and Conditions</a>.
                            </label>
                        </div>

                        <!-- REGISTER BUTTON -->
                        <div class="input-group">
                            <button class="btn btn-lg w-100 fs-6" type="submit" value="Register">Register</button>
                        </div>

                        <!-- LOGIN IF HAS ACCOUNT -->
                        <div class="row mb-3 text-center">
                            <small>Already registered? <a href="login.html" style="color: chocolate;">Login here.</a></small>
                        </div>
                    </form>
                </div>
            </div>
        </div>


        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    </body>
</html>

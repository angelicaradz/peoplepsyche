<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width-device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/sty.css">
        <title>Take Assessment | PeoplePsyche</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    </head>

    <body>
        <div class="container d-flex justify-content-center align-items-center min-vh-100">
            <div class="row border rounded-5 p-5 shadow box-area bg-white justify-content-center align-items-center d-flex flex-lg-row">
                <div class="row mb-4">
                    <h2 class="text-center">Assessment</h2>
                </div>
                <div class="row justify-content-center align-items-center">
                    <form class="g-3 align-items-center needs-validation" novalidate>
                        <div class="overflow-hidden mb-3">
                            <label for="codeInput" class="form-label">Enter code</label>
                            <input type="text" class="form-control" id="codeInput" placeholder="Enter code">
                        </div>
                        <div class="overflow-hidden mb-3">
                            <label for="formFile" class="form-label">Proof of payment</label>
                            <input class="form-control" type="file" id="formFile">
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-center align-items-center">
                            <button class="assess-btn btn btn-lg fs-6" type="submit">Submit</button>
                            <a href="dashboard.html" class="cancel-assess-btn btn btn-lg fs-6" type="button">Cancel</a>
                        </div>
                        
                        <div class="row mb-3 text-center">
                            <small>No access code? <a href="#" style="color: chocolate;">Request here!</a></small>
                        </div>
                    </form>
                    
                </div>
            </div>
        </div>


        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    </body>
</html>

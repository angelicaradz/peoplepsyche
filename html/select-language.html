<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width-device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/sty.css">
        <title>PeoplePsyche Portal</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    </head>

    <body>
        <div class="container d-flex justify-content-center align-items-center min-vh-100">
            <div class="row border rounded-5 p-5 shadow box-area bg-white justify-content-center align-items-center d-flex flex-lg-row">

                <div class="row mb-4">
                    <h5 class="text-center">Select language</h5>
                </div>
                <div class="row d-grid gap-2 d-md-flex justify-content-center align-items-center">
                    <div id="language-selection" class="d-grid gap-2 d-md-flex justify-content-center align-items-center">
                        <button id="english-btn" class="btn btn-lg fs-6" type="button">English</button>
                        <button id="mandarin-btn" class="btn btn-lg fs-6" type="button">Chinese (Mandarin)</button>
                    </div>
                </div>
            </div>
        </div>


        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    </body>
</html>

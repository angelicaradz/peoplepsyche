<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width-device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/sty.css">
        <title>Login | PeoplePsyche</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    </head>

    <body>
        <div class="container d-flex justify-content-center align-items-center min-vh-100">
            <!-- LOGIN BOX -->
            <div id="login-page" class="row border rounded-5 p-5 shadow box-area bg-white justify-content-center align-items-center d-flex flex-lg-row">
                
                <!-- FORM TITLE -->
                <div class="row mb-4">
                    <h2 class="text-center">PeoplePsyche Login</h2>
                </div>

                <!-- LOGIN FORM -->
                <div class="row justify-content-center align-items-center">
                    <form id="login-form" class="g-3" action="POST">

                        <!-- EMAIL ADDRESS INPUT FIELD -->
                        <div class="form-floating mb-2 overflow-hidden">
                            <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" required>
                            <label for="floatingInput">Email address</label>
                        </div>

                        <!-- PASSWORD INPUT FIELD -->
                        <div class="form-floating overflow-hidden">
                            <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                            <label for="floatingPassword">Password</label>
                        </div>

                        <!-- SAVE LOGIN INFO OPTION -->
                        <div class="form-check mt-1 mb-4">
                            <input class="form-check-input" type="checkbox" value="Remember Me" id="flexCheckChecked" checked>
                            <label class="form-check-label text-secondary" for="flexCheckChecked">
                                Remember me
                            </label>
                        </div>

                        <!-- SUBMIT BUTTON -->
                        <div class="input-group">
                            <button class="btn btn-lg w-100 fs-6" type="submit" value="Login">Login</button>
                        </div>

                        <!-- REGISTER IF NO ACCOUNT YET -->
                        <div class="text-center">
                            <small>Don't have an account yet? <a href="register.html" style="color: chocolate;">Register here.</a></small>
                        </div>
                    </form>
                </div>
            </div>
        </div>


        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    </body>
</html>

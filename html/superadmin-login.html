<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width-device-width, initial-scale=1">
        <link rel="stylesheet" href="../css/sty.css">
        <title>SuperAdmin Login | PeoplePsyche</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    </head>

    <body>
        <div class="container d-flex flex-lg-row justify-content-center align-items-center min-vh-100">
            <div class="row border rounded-5 p-5 shadow box-area bg-white justify-content-center align-items-center d-flex flex-lg-row">
                <div class="row flex-lg-row mb-4">
                    <h2 class="text-center">SuperAdmin Login</h2>
                </div>
                <div class="row flex-lg-row justify-content-center align-items-center">
                    <form class="g-3 align-items-center needs-validation" novalidate>
                        <div class="form-floating mb-2 overflow-hidden">
                            <input type="text" class="form-control" id="floatingInput" placeholder="Enter username" required>
                            <label for="floatingInput" class="form-label">Username</label>
                            <div class="invalid-feedback">
                                Please fill out this field.
                            </div>
                        </div>
                        <div class="form-floating overflow-hidden">
                            <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                            <label for="floatingPassword">Password</label>
                            <div class="invalid-feedback">
                                Please fill out this field.
                            </div>
                        </div>
                        <div class="input-group mt-4">
                            <button class="btn btn-lg btn-primary w-100 fs-6" type="submit">Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>


        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    </body>
</html>
